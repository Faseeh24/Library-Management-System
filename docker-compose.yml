services:
  api:
    build: .
    container_name: library_api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "8001:8000"
    volumes:
      - ./backend/reports:/app/backend/reports

  worker:
    build: .
    container_name: library_worker
    command: celery -A backend.tasks.celery_app.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./backend/reports:/app/backend/reports

  redis:
    image: redis:7
    container_name: library_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: library_postgres
    environment:
      POSTGRES_DB: librarydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
    container_name: library_frontend
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "5173:5173"

volumes:
  postgres_data:
