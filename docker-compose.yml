services:

  app:
    build: .
    container_name: library_app

    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432


  api:
    build: .

    container_name: library_api

    command:
      uvicorn api:app --host 0.0.0.0 --port 8000

    depends_on:
      - postgres


    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432


    ports:
      - "8000:8000"



  postgres:

    image: postgres:16

    container_name: library_postgres


    environment:

      POSTGRES_DB: librarydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password


    ports:
      - "5432:5432"


    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:

  postgres_data: