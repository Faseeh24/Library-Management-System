services:
  app:
    build: .
    container_name: library_app
    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  api:
    build: .
    container_name: library_api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "8001:8000"
    volumes:
      - ./reports:/app/reports

  worker:
    build: .
    container_name: library_worker
    command: celery -A celery_app.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports:/app/reports

  redis:
    image: redis:7
    container_name: library_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: library_postgres
    environment:
      POSTGRES_DB: librarydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
