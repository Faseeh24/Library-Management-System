version: "3.9"

services:
  app:
    build: .
    container_name: library_app

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_NAME: librarydb
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432

    stdin_open: true
    tty: true

  postgres:
    image: postgres:16

    container_name: library_postgres

    restart: always

    environment:
      POSTGRES_DB: librarydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: